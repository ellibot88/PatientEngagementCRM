<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>domo.js Feature Report</title>
  <link rel="stylesheet" href="public-assets/assets/css/styles.css">
</head>
<body>
  <div class="container">
    <!-- Header Section -->
    <header class="header">
      <h1>domo.js Feature Report</h1>
      <p>Comprehensive testing suite for all domo.js APIs and functionality</p>
      
      <!-- Device Detection Info -->
      <div id="deviceInfo" class="device-detection-header">
        <div class="device-status">
          <span>Device:</span>
          <span id="deviceType" class="device-badge">Detecting...</span>
        </div>
      </div>
    </header>
    
    <!-- Controls Section -->
    <section class="controls">
      <button id="runTests" class="btn">
        <span class="spinner" id="spinner" style="display: none;"></span>
        <span id="runTestsText">🚀 Run All Tests</span>
      </button>
      <button id="clearResults" class="btn btn-secondary">🧹 Clear Results</button>
      <button id="exportResults" class="btn btn-secondary">📊 Export Results</button>
      
      <div class="stats">
        <div class="stat">
          <span>Total:</span>
          <span class="stat-value" id="totalTests">0</span>
        </div>
        <div class="stat">
          <span>✅ Passed:</span>
          <span class="stat-value" id="passedTests">0</span>
        </div>
        <div class="stat">
          <span>❌ Failed:</span>
          <span class="stat-value" id="failedTests">0</span>
        </div>
        <div class="stat">
          <span>⏳ Pending:</span>
          <span class="stat-value" id="pendingTests">0</span>
        </div>
      </div>
    </section>
    
    <!-- Main Content Section -->
    <main class="content">
      <table id="reportTable">
        <thead>
          <tr>
            <th>API Method</th>
            <th>Status</th>
            <th>Details & Results</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Test rows will be dynamically generated here -->
        </tbody>
      </table>
    </main>
  </div>

  <!-- Scripts -->
  <script src="public-assets/domo.js"></script>
  <!-- <script src="https://cdn.jsdelivr.net/npm/ryuu.js@4.7.0"></script> -->
  <script src="public-assets/assets/js/tests.js"></script>
  <script src="public-assets/assets/js/utils.js"></script>
  <script src="public-assets/assets/js/app.js"></script>
</body>
</html>
